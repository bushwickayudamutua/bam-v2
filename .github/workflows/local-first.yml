name: local-first

on:
  push:
    paths: ["local-first/**", ".github/workflows/local-first.yml"]
  pull_request:
    paths: ["local-first/**", ".github/workflows/local-first.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-first
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: local-first/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
